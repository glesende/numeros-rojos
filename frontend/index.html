<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portal de transparencia económica y deportiva del Club Atlético Independiente. Contratos de jugadores, compromisos económicos, deudas, balances oficiales y estadísticas." />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.numerosrojos.net/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Números Rojos - Portal de datos de Independiente" />
    <meta property="og:description" content="Portal de transparencia económica y deportiva del Club Atlético Independiente. Contratos de jugadores, compromisos económicos, deudas, balances oficiales y estadísticas." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.numerosrojos.net/" />
    <meta property="og:image" content="https://www.numerosrojos.net/og-image-nr.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:site_name" content="Números Rojos" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Números Rojos - Portal de datos de Independiente" />
    <meta name="twitter:description" content="Portal de transparencia económica y deportiva del Club Atlético Independiente. Contratos de jugadores, compromisos económicos, deudas, balances oficiales y estadísticas." />
    <meta name="twitter:image" content="https://www.numerosrojos.net/og-image-nr.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "Números Rojos",
          "url": "https://www.numerosrojos.net",
          "description": "Portal de datos abiertos del Club Atlético Independiente. Transparencia económica, contractual y deportiva.",
          "inLanguage": "es-AR",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.numerosrojos.net/contratos?search={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "Números Rojos",
          "url": "https://www.numerosrojos.net",
          "description": "Portal de transparencia económica y deportiva del Club Atlético Independiente (Argentina).",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.numerosrojos.net/og-image-nr.png"
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Números Rojos - Portal de datos del Club Atlético Independiente</title>
    <!-- Google Analytics 4 (carga solo si VITE_GA_MEASUREMENT_ID está definido en el build) -->
    <script>
      (function() {
        var measurementId = '%VITE_GA_MEASUREMENT_ID%';
        if (!measurementId || !measurementId.startsWith('G-')) return;
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=' + measurementId;
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', measurementId, { send_page_view: false });
      })();
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
